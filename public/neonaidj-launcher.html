<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON AI DJ</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  iframe { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; z-index: 10; }
  .overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 30%, #0a0a0a 60%, #0a1a2e 100%);
    transition: opacity 0.5s ease;
  }
  .overlay.hidden { opacity: 0; pointer-events: none; z-index: -1; }
  .logo-container { text-align: center; margin-bottom: 40px; }
  .logo-text {
    font-size: 72px; font-weight: 900; letter-spacing: 8px;
    background: linear-gradient(90deg, #00f0ff, #a855f7, #f43f5e, #00f0ff);
    background-size: 300% 100%;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    animation: gradient-shift 4s ease infinite;
  }
  .logo-sub {
    font-size: 18px; letter-spacing: 12px; color: #666; margin-top: 8px;
    text-transform: uppercase;
  }
  @keyframes gradient-shift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  .status {
    text-align: center; color: #888; font-size: 16px;
  }
  .status-icon {
    display: inline-block; width: 12px; height: 12px; border-radius: 50%;
    margin-right: 8px; vertical-align: middle;
    background: #f59e0b;
    animation: pulse-dot 1.5s ease infinite;
  }
  .status-icon.connected { background: #22c55e; animation: none; }
  .status-icon.error { background: #ef4444; }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }
  .retry-info {
    margin-top: 12px; font-size: 13px; color: #555;
  }
  .manual-retry {
    margin-top: 24px; padding: 10px 28px; border: 1px solid #333; border-radius: 8px;
    background: transparent; color: #888; font-size: 14px; cursor: pointer;
    transition: all 0.2s;
  }
  .manual-retry:hover { border-color: #a855f7; color: #a855f7; }
</style>
</head>
<body>

<iframe id="app" src="about:blank"></iframe>

<div class="overlay" id="overlay">
  <div class="logo-container">
    <div class="logo-text">NEON AI DJ</div>
    <div class="logo-sub">Automated Intelligent Disc Jockey</div>
  </div>
  <div class="status">
    <span class="status-icon" id="statusDot"></span>
    <span id="statusText">Connecting to server...</span>
  </div>
  <div class="retry-info" id="retryInfo"></div>
  <button class="manual-retry" onclick="tryConnect()">Retry Now</button>
</div>

<script>
  const APP_URL = 'http://localhost:3001';
  const RETRY_INTERVALS = [2000, 3000, 5000, 5000, 10000];
  let attempt = 0;
  let connected = false;
  let retryTimer = null;

  const iframe = document.getElementById('app');
  const overlay = document.getElementById('overlay');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const retryInfo = document.getElementById('retryInfo');

  function showOverlay(msg, dotClass) {
    overlay.classList.remove('hidden');
    statusText.textContent = msg;
    statusDot.className = 'status-icon ' + (dotClass || '');
  }

  function hideOverlay() {
    overlay.classList.add('hidden');
    connected = true;
  }

  async function tryConnect() {
    if (retryTimer) { clearTimeout(retryTimer); retryTimer = null; }
    attempt++;
    showOverlay('Connecting to server... (attempt ' + attempt + ')', '');
    retryInfo.textContent = '';

    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 5000);
      const res = await fetch(APP_URL + '/api/health', { signal: controller.signal, mode: 'no-cors' });
      clearTimeout(timeout);

      showOverlay('Server found! Loading...', 'connected');
      iframe.src = APP_URL;
      setTimeout(() => {
        hideOverlay();
        attempt = 0;
      }, 2000);

    } catch (e) {
      const delay = RETRY_INTERVALS[Math.min(attempt - 1, RETRY_INTERVALS.length - 1)];
      showOverlay('Server not available', 'error');
      retryInfo.textContent = 'Retrying in ' + (delay / 1000) + ' seconds...';
      retryTimer = setTimeout(tryConnect, delay);
    }
  }

  iframe.addEventListener('load', function() {
    try {
      if (iframe.contentWindow && iframe.contentWindow.location.href !== 'about:blank') {
        hideOverlay();
        attempt = 0;
      }
    } catch(e) {
      hideOverlay();
      attempt = 0;
    }
  });

  setInterval(function() {
    if (!connected) return;
    fetch(APP_URL + '/api/health', { mode: 'no-cors' }).catch(() => {
      connected = false;
      attempt = 0;
      showOverlay('Connection lost — reconnecting...', 'error');
      tryConnect();
    });
  }, 10000);

  tryConnect();
</script>
</body>
</html>
