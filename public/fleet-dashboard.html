<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>NEON AI DJ — Fleet Command Center</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #08081a;
      color: #e2e8f0;
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }
    .header {
      background: linear-gradient(135deg, #0d0d2b 0%, #08081a 100%);
      border-bottom: 1px solid #1e293b;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo {
      font-size: 18px;
      font-weight: 700;
      color: #00d4ff;
      text-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
      letter-spacing: 1px;
    }
    .logo-sub {
      font-size: 11px;
      color: #64748b;
      font-weight: 400;
      letter-spacing: 0.5px;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }
    .status-dot.active { background: #22c55e; box-shadow: 0 0 8px rgba(34, 197, 94, 0.5); }
    .status-dot.inactive { background: #ef4444; }
    .refresh-timer {
      font-size: 11px;
      color: #475569;
    }
    .pin-bar {
      background: #0d0d1f;
      border-bottom: 1px solid #1e293b;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .pin-bar label {
      font-size: 12px;
      color: #64748b;
      white-space: nowrap;
    }
    .pin-input {
      background: #1a1a2e;
      border: 1px solid #2d2d4a;
      border-radius: 6px;
      color: #e2e8f0;
      padding: 6px 10px;
      font-size: 14px;
      width: 100px;
      -webkit-text-security: disc;
      outline: none;
    }
    .pin-input:focus { border-color: #00d4ff; }
    .pin-saved {
      font-size: 11px;
      color: #22c55e;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .pin-saved.show { opacity: 1; }
    .container {
      padding: 16px;
      max-width: 900px;
      margin: 0 auto;
    }
    .summary-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .summary-card {
      background: #0d0d1f;
      border: 1px solid #1e293b;
      border-radius: 10px;
      padding: 12px 16px;
      flex: 1;
      min-width: 80px;
      text-align: center;
    }
    .summary-card .value {
      font-size: 24px;
      font-weight: 700;
      color: #00d4ff;
    }
    .summary-card .label {
      font-size: 11px;
      color: #64748b;
      margin-top: 2px;
    }
    .summary-card.online .value { color: #22c55e; }
    .summary-card.offline .value { color: #ef4444; }
    .device-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    @media (min-width: 640px) {
      .device-grid { grid-template-columns: 1fr 1fr; }
    }
    .device-card {
      background: #0d0d1f;
      border: 1px solid #1e293b;
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.3s;
    }
    .device-card.online { border-color: #1a3a2a; }
    .device-card.offline { border-color: #3a1a1a; }
    .card-header {
      padding: 14px 16px 10px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .device-name {
      font-size: 16px;
      font-weight: 600;
      color: #f1f5f9;
    }
    .device-club {
      font-size: 12px;
      color: #64748b;
      margin-top: 2px;
    }
    .status-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .status-badge.online {
      background: rgba(34, 197, 94, 0.15);
      color: #22c55e;
      border: 1px solid rgba(34, 197, 94, 0.3);
    }
    .status-badge.offline {
      background: rgba(239, 68, 68, 0.15);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.3);
      animation: pulse-red 2s infinite;
    }
    @keyframes pulse-red {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    .card-stats {
      padding: 0 16px 12px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 16px;
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
    }
    .stat-label { color: #64748b; }
    .stat-value { color: #cbd5e1; font-weight: 500; }
    .stat-value.warn { color: #f59e0b; }
    .stat-value.danger { color: #ef4444; }
    .now-playing {
      padding: 0 16px 10px;
      font-size: 12px;
    }
    .now-playing-label { color: #64748b; }
    .now-playing-info {
      color: #a78bfa;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-actions {
      border-top: 1px solid #1e293b;
      padding: 10px 12px;
      display: flex;
      gap: 8px;
    }
    .btn {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #2d2d4a;
      border-radius: 8px;
      background: #1a1a2e;
      color: #e2e8f0;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.96); }
    .btn.update {
      border-color: rgba(37, 99, 235, 0.4);
      color: #60a5fa;
    }
    .btn.update:hover { background: rgba(37, 99, 235, 0.15); }
    .btn.restart {
      border-color: rgba(245, 158, 11, 0.4);
      color: #fbbf24;
    }
    .btn.restart:hover { background: rgba(245, 158, 11, 0.15); }
    .btn.reboot {
      border-color: rgba(239, 68, 68, 0.4);
      color: #f87171;
    }
    .btn.reboot:hover { background: rgba(239, 68, 68, 0.15); }
    .btn.sync {
      border-color: rgba(168, 85, 247, 0.4);
      color: #c084fc;
    }
    .btn.sync:hover { background: rgba(168, 85, 247, 0.15); }
    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }
    .btn .spinner {
      width: 12px;
      height: 12px;
      border: 2px solid transparent;
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .toast-container {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }
    .toast {
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      animation: toast-in 0.3s ease-out;
      pointer-events: auto;
      max-width: 320px;
      text-align: center;
    }
    .toast.success {
      background: rgba(34, 197, 94, 0.9);
      color: #fff;
    }
    .toast.error {
      background: rgba(239, 68, 68, 0.9);
      color: #fff;
    }
    .toast.info {
      background: rgba(37, 99, 235, 0.9);
      color: #fff;
    }
    @keyframes toast-in {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #475569;
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state .title {
      font-size: 18px;
      color: #64748b;
      margin-bottom: 6px;
    }
    .empty-state .subtitle { font-size: 13px; }
    .global-actions {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .btn-global {
      padding: 10px 16px;
      border: 1px solid #2d2d4a;
      border-radius: 8px;
      background: #1a1a2e;
      color: #e2e8f0;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }
    .btn-global:hover { background: #252540; }
    .btn-global:active { transform: scale(0.97); }
    .btn-global:disabled { opacity: 0.4; cursor: not-allowed; }
    .last-seen {
      font-size: 11px;
      color: #475569;
      padding: 0 16px 8px;
    }
    .api-costs-bar {
      padding: 0 16px 10px;
      border-top: 1px solid #1a1a2e;
      margin-top: 4px;
      padding-top: 8px;
    }
    .api-costs-label {
      font-size: 11px;
      color: #64748b;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .api-costs-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
    .api-cost-item {
      text-align: center;
    }
    .api-cost-item .cost-label {
      font-size: 9px;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .api-cost-item .cost-value {
      font-size: 13px;
      font-weight: 600;
    }
    .api-cost-item .cost-value.total { color: #34d399; }
    .api-cost-item .cost-value.elevenlabs { color: #a78bfa; }
    .api-cost-item .cost-value.openai { color: #60a5fa; }
    .api-cost-calls {
      font-size: 10px;
      color: #475569;
      text-align: center;
      margin-top: 2px;
    }
    .summary-card.costs .value { color: #34d399; }
    .summary-card.entertainers .value { color: #f472b6; }
    .stat-value.mem-warn { color: #f59e0b; }
    .stat-value.mem-danger { color: #ef4444; }
    .stat-value.errors { color: #ef4444; }
    .net-quality {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .net-bars {
      display: inline-flex;
      align-items: flex-end;
      gap: 1px;
      height: 12px;
    }
    .net-bar {
      width: 3px;
      background: #334155;
      border-radius: 1px;
    }
    .net-bar.active.good { background: #22c55e; }
    .net-bar.active.fair { background: #f59e0b; }
    .net-bar.active.poor { background: #ef4444; }
    .net-bar.active.down { background: #ef4444; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div>
        <div class="logo">NEON AI DJ</div>
        <div class="logo-sub">Fleet Command Center</div>
      </div>
    </div>
    <div class="header-right">
      <span class="refresh-timer" id="refreshTimer"></span>
      <span class="status-dot" id="connectionDot"></span>
    </div>
  </div>

  <div class="pin-bar">
    <label>PIN:</label>
    <input type="password" class="pin-input" id="pinInput" placeholder="Enter PIN" inputmode="numeric" maxlength="10">
    <span class="pin-saved" id="pinSaved">Saved</span>
  </div>

  <div class="container">
    <div class="summary-bar" id="summaryBar"></div>
    <div class="global-actions">
      <button class="btn-global" onclick="updateAll()" id="btnUpdateAll">
        <span>⬆</span> Update All
      </button>
      <button class="btn-global" onclick="syncAll()" id="btnSyncAll">
        <span>☁</span> Sync All
      </button>
      <button class="btn-global" onclick="testTelegram()">
        <span>📱</span> Test Alert
      </button>
    </div>
    <div id="deviceGrid" class="device-grid"></div>

    <div style="margin-top:24px; background:#0d0d1f; border:1px solid #1e293b; border-radius:12px; padding:16px;">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;">
        <div style="font-size:12px; font-weight:700; color:#f87171; text-transform:uppercase; letter-spacing:1px;">⚠ Playback Errors</div>
        <button onclick="clearPlaybackErrors()" style="font-size:11px; padding:4px 10px; background:#1e293b; border:1px solid #334155; border-radius:6px; color:#94a3b8; cursor:pointer;">Clear All</button>
      </div>
      <div id="playbackErrorsList" style="font-size:12px; color:#94a3b8;">Loading...</div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    const REFRESH_INTERVAL = 30;
    let refreshCountdown = REFRESH_INTERVAL;
    let devices = [];
    let currentCommitSha = null;
    let pendingCommands = new Set();

    const pinInput = document.getElementById('pinInput');
    const pinSaved = document.getElementById('pinSaved');

    const savedPin = localStorage.getItem('fleet_pin');
    if (savedPin) pinInput.value = savedPin;

    pinInput.addEventListener('input', () => {
      localStorage.setItem('fleet_pin', pinInput.value);
      pinSaved.classList.add('show');
      setTimeout(() => pinSaved.classList.remove('show'), 1500);
    });

    function getPin() {
      return pinInput.value || localStorage.getItem('fleet_pin') || '';
    }

    function showToast(message, type = 'info') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transition = 'opacity 0.3s';
        setTimeout(() => toast.remove(), 300);
      }, 3500);
    }

    function formatUptime(seconds) {
      if (!seconds) return '--';
      const d = Math.floor(seconds / 86400);
      const h = Math.floor((seconds % 86400) / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      if (d > 0) return `${d}d ${h}h`;
      if (h > 0) return `${h}h ${m}m`;
      return `${m}m`;
    }

    function formatDisk(free, total) {
      if (!free || !total) return '--';
      const freeGB = (free / 1073741824).toFixed(1);
      const totalGB = (total / 1073741824).toFixed(1);
      const pct = Math.round((free / total) * 100);
      return `${freeGB}/${totalGB} GB (${pct}%)`;
    }

    function diskClass(free, total) {
      if (!free || !total) return '';
      const pct = (free / total) * 100;
      if (pct < 10) return 'danger';
      if (pct < 25) return 'warn';
      return '';
    }

    function tempClass(temp) {
      if (!temp) return '';
      const t = parseFloat(temp);
      if (t > 80) return 'danger';
      if (t > 70) return 'warn';
      return '';
    }

    function formatNetwork(net) {
      if (!net || !net.pingOk) {
        return `<span class="net-quality">
          <span class="net-bars">${[3,5,8,11].map(h => `<span class="net-bar active down" style="height:${h}px"></span>`).join('')}</span>
          <span style="color:#ef4444">${net?.packetLoss === 100 ? 'No Internet' : 'Down'}</span>
        </span>`;
      }
      const avg = net.pingAvg;
      let quality, cls, bars;
      if (avg < 30) { quality = 'Excellent'; cls = 'good'; bars = 4; }
      else if (avg < 60) { quality = 'Good'; cls = 'good'; bars = 3; }
      else if (avg < 100) { quality = 'Fair'; cls = 'fair'; bars = 2; }
      else { quality = 'Poor'; cls = 'poor'; bars = 1; }
      const heights = [3, 5, 8, 11];
      const barsHtml = heights.map((h, i) =>
        `<span class="net-bar ${i < bars ? 'active ' + cls : ''}" style="height:${h}px"></span>`
      ).join('');
      const color = cls === 'good' ? '#22c55e' : cls === 'fair' ? '#f59e0b' : '#ef4444';
      return `<span class="net-quality">
        <span class="net-bars">${barsHtml}</span>
        <span style="color:${color}">${avg.toFixed(0)}ms</span>
        <span style="color:#475569;font-size:10px">${quality}</span>
      </span>`;
    }

    function memClass(pct) {
      if (pct == null) return '';
      if (pct > 90) return 'mem-danger';
      if (pct > 75) return 'mem-warn';
      return '';
    }

    function formatLastUpdate(timestamp) {
      if (!timestamp) return '--';
      const ts = timestamp < 1e12 ? timestamp * 1000 : timestamp;
      const d = new Date(ts);
      if (isNaN(d.getTime())) return '--';
      const now = new Date();
      const timeStr = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      const diffDays = Math.floor((now.setHours(0,0,0,0) - new Date(ts).setHours(0,0,0,0)) / 86400000);
      if (diffDays === 0) return `Today ${timeStr}`;
      if (diffDays === 1) return `Yesterday ${timeStr}`;
      const monthDay = d.toLocaleDateString([], { month: 'short', day: 'numeric' });
      return `${monthDay} ${timeStr}`;
    }

    function renderUpdateStatus(d) {
      const sha = d.lastUpdateCommit;
      const ts = formatLastUpdate(d.lastUpdateTime);
      if (!sha) {
        return `<span style="color:#6b7280" title="Run the update script once to enable verification">${ts} <span style="font-size:10px">(unverified)</span></span>`;
      }
      const match = currentCommitSha && sha === currentCommitSha;
      const noRef = !currentCommitSha;
      if (noRef) {
        return `${ts} <span style="color:#9ca3af;font-size:11px;font-family:monospace">${sha}</span>`;
      }
      if (match) {
        return `${ts} <span style="color:#22c55e;font-size:11px;font-family:monospace" title="Running current code">✓ ${sha}</span>`;
      }
      return `${ts} <span style="color:#f97316;font-size:11px;font-family:monospace" title="Outdated — homebase is on ${currentCommitSha}">✗ ${sha}</span>`;
    }

    function formatAgo(seconds) {
      if (seconds < 60) return `${seconds}s ago`;
      if (seconds < 3600) return `${Math.floor(seconds / 60)}m ago`;
      if (seconds < 86400) return `${Math.floor(seconds / 3600)}h ago`;
      return `${Math.floor(seconds / 86400)}d ago`;
    }

    function renderSummary() {
      const online = devices.filter(d => d.status === 'online').length;
      const offline = devices.filter(d => d.status === 'offline').length;
      const total = devices.length;
      const totalTracks = devices.reduce((s, d) => s + (d.trackCount || 0), 0);
      const totalVoiceovers = devices.reduce((s, d) => s + (d.voiceoverCount || 0), 0);

      const fleetCost = devices.reduce((s, d) => s + (d.apiCosts?.total || 0), 0);
      const totalEntertainers = devices.reduce((s, d) => s + (d.activeEntertainers || 0), 0);
      const totalErrors = devices.reduce((s, d) => s + (d.errorCount || 0), 0);

      document.getElementById('summaryBar').innerHTML = `
        <div class="summary-card"><div class="value">${total}</div><div class="label">Devices</div></div>
        <div class="summary-card online"><div class="value">${online}</div><div class="label">Online</div></div>
        <div class="summary-card offline"><div class="value">${offline}</div><div class="label">Offline</div></div>
        <div class="summary-card"><div class="value">${totalVoiceovers}</div><div class="label">Voiceovers</div></div>
        <div class="summary-card entertainers"><div class="value">${totalEntertainers}</div><div class="label">Entertainers</div></div>
        <div class="summary-card costs"><div class="value">$${fleetCost.toFixed(2)}</div><div class="label">API Costs (30d)</div></div>
      `;
    }

    function renderDevices() {
      const grid = document.getElementById('deviceGrid');
      if (devices.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <div class="icon">📡</div>
            <div class="title">No devices yet</div>
            <div class="subtitle">Waiting for Pi units to send heartbeats...</div>
          </div>
        `;
        return;
      }

      const sorted = [...devices].sort((a, b) => {
        if (a.status !== b.status) return a.status === 'online' ? -1 : 1;
        return (a.name || '').localeCompare(b.name || '');
      });

      grid.innerHTML = sorted.map(d => {
        const cmdKey = d.deviceId;
        const isUpdating = pendingCommands.has(`${cmdKey}-update`);
        const isRestarting = pendingCommands.has(`${cmdKey}-restart`);
        const isRebooting = pendingCommands.has(`${cmdKey}-reboot`);
        const isSyncing = pendingCommands.has(`${cmdKey}-sync`);
        const isOffline = d.status === 'offline';

        return `
          <div class="device-card ${d.status}">
            <div class="card-header">
              <div>
                <div class="device-name">${esc(d.name || d.deviceId)}</div>
                <div class="device-club">${esc(d.clubName || 'Unknown Club')}</div>
              </div>
              <span class="status-badge ${d.status}">${d.status}</span>
            </div>
            <div class="card-stats">
              <div class="stat-row">
                <span class="stat-label">CPU Temp</span>
                <span class="stat-value ${tempClass(d.cpuTemp)}">${d.cpuTemp ? d.cpuTemp + '°C' : '--'}</span>
              </div>
              <div class="stat-row">
                <span class="stat-label">Uptime</span>
                <span class="stat-value">${formatUptime(d.uptime)}</span>
              </div>
              <div class="stat-row">
                <span class="stat-label">Disk</span>
                <span class="stat-value ${diskClass(d.diskFree, d.diskTotal)}">${formatDisk(d.diskFree, d.diskTotal)}</span>
              </div>
              <div class="stat-row">
                <span class="stat-label">Tracks</span>
                <span class="stat-value">${d.trackCount || 0}</span>
              </div>
              <div class="stat-row">
                <span class="stat-label">Voiceovers</span>
                <span class="stat-value">${d.voiceoverCount || 0}</span>
              </div>
              <div class="stat-row">
                <span class="stat-label">Version</span>
                <span class="stat-value">${esc(d.version || '--')}</span>
              </div>
              <div class="stat-row">
                <span class="stat-label">Memory</span>
                <span class="stat-value ${memClass(d.memPct)}">${d.memPct != null ? d.memPct + '% used' : '--'}</span>
              </div>
              <div class="stat-row">
                <span class="stat-label">Service</span>
                <span class="stat-value">${d.serviceUptime != null ? formatUptime(d.serviceUptime) : '--'}</span>
              </div>
              <div class="stat-row">
                <span class="stat-label">Entertainers</span>
                <span class="stat-value" style="color: #f472b6">${d.activeEntertainers || 0}</span>
              </div>
              <div class="stat-row">
                <span class="stat-label">Errors</span>
                <span class="stat-value ${d.errorCount > 0 ? 'errors' : ''}">${d.errorCount || 0}</span>
              </div>
              <div class="stat-row">
                <span class="stat-label">Last Update</span>
                <span class="stat-value">${renderUpdateStatus(d)}</span>
              </div>
              <div class="stat-row">
                <span class="stat-label">IP</span>
                <span class="stat-value">${esc(d.tailscaleIp || d.ip || '--')}</span>
              </div>
              <div class="stat-row" style="grid-column: 1 / -1">
                <span class="stat-label">Network</span>
                <span class="stat-value">${formatNetwork(d.network)}</span>
              </div>
            </div>
            ${d.currentDancer || d.currentSong ? `
              <div class="now-playing">
                <div class="now-playing-label">Now Playing</div>
                <div class="now-playing-info">${esc(d.currentDancer || '')}${d.currentDancer && d.currentSong ? ' — ' : ''}${esc(d.currentSong || '')}</div>
              </div>
            ` : ''}
            <div class="last-seen">Last seen: ${formatAgo(d.secondsAgo || 0)}</div>
            ${d.apiCosts ? `
              <div class="api-costs-bar">
                <div class="api-costs-label">💲 API Costs (30 Day)</div>
                <div class="api-costs-grid">
                  <div class="api-cost-item"><div class="cost-label">Total</div><div class="cost-value total">$${(d.apiCosts.total || 0).toFixed(2)}</div></div>
                  <div class="api-cost-item"><div class="cost-label">ElevenLabs</div><div class="cost-value elevenlabs">$${(d.apiCosts.elevenlabs || 0).toFixed(2)}</div></div>
                  <div class="api-cost-item"><div class="cost-label">OpenAI</div><div class="cost-value openai">$${(d.apiCosts.openai || 0).toFixed(2)}</div></div>
                </div>
                <div class="api-cost-calls">${d.apiCosts.calls || 0} API calls</div>
              </div>
            ` : ''}
            <div class="card-actions">
              <button class="btn update" onclick="sendCommand('${esc(d.deviceId)}', 'update')" ${isUpdating || isOffline ? 'disabled' : ''}>
                ${isUpdating ? '<span class="spinner"></span>' : '<span>⬆</span>'} Update
              </button>
              <button class="btn restart" onclick="sendCommand('${esc(d.deviceId)}', 'restart')" ${isRestarting || isOffline ? 'disabled' : ''}>
                ${isRestarting ? '<span class="spinner"></span>' : '<span>↻</span>'} Restart
              </button>
              <button class="btn sync" onclick="sendCommand('${esc(d.deviceId)}', 'sync')" ${isSyncing || isOffline ? 'disabled' : ''}>
                ${isSyncing ? '<span class="spinner"></span>' : '<span>☁</span>'} Sync
              </button>
              <button class="btn reboot" onclick="sendReboot('${esc(d.deviceId)}')" ${isRebooting || isOffline ? 'disabled' : ''}>
                ${isRebooting ? '<span class="spinner"></span>' : '<span>⏻</span>'} Reboot
              </button>
            </div>
          </div>
        `;
      }).join('');
    }

    function esc(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    async function fetchStatus() {
      try {
        const res = await fetch('/api/monitor/status');
        const data = await res.json();
        devices = data.devices || [];
        currentCommitSha = data.currentCommitSha || null;
        document.getElementById('connectionDot').className = 'status-dot active';
        renderSummary();
        renderDevices();
      } catch (err) {
        document.getElementById('connectionDot').className = 'status-dot inactive';
        console.error('Failed to fetch status:', err);
      }
    }

    async function sendCommand(deviceId, action) {
      const pin = getPin();
      if (!pin) {
        showToast('Enter your PIN first', 'error');
        pinInput.focus();
        return;
      }

      const key = `${deviceId}-${action}`;
      pendingCommands.add(key);
      renderDevices();

      try {
        const res = await fetch(`/api/monitor/command/${encodeURIComponent(deviceId)}/${action}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pin }),
        });
        const data = await res.json();
        if (res.ok) {
          const labels = { update: 'Update started', restart: 'Restarting...', reboot: 'Rebooting...', sync: 'Sync complete' };
          showToast(`${labels[action] || 'Done'} — ${deviceId}`, 'success');
        } else {
          showToast(data.error || 'Command failed', 'error');
        }
      } catch (err) {
        showToast(`Failed: ${err.message}`, 'error');
      }

      setTimeout(() => {
        pendingCommands.delete(key);
        renderDevices();
      }, action === 'update' ? 5000 : 3000);
    }

    async function sendReboot(deviceId) {
      const device = devices.find(d => d.deviceId === deviceId);
      const name = device ? device.name : deviceId;
      if (!confirm(`REBOOT the entire Pi "${name}"?\n\nThis will take 1-2 minutes to come back online.`)) return;
      sendCommand(deviceId, 'reboot');
    }

    async function updateAll() {
      const onlineDevices = devices.filter(d => d.status === 'online');
      if (onlineDevices.length === 0) {
        showToast('No online devices', 'error');
        return;
      }
      if (!confirm(`Update all ${onlineDevices.length} online device(s)?`)) return;
      for (const d of onlineDevices) {
        sendCommand(d.deviceId, 'update');
      }
    }

    async function syncAll() {
      const onlineDevices = devices.filter(d => d.status === 'online');
      if (onlineDevices.length === 0) {
        showToast('No online devices', 'error');
        return;
      }
      for (const d of onlineDevices) {
        sendCommand(d.deviceId, 'sync');
      }
    }

    async function testTelegram() {
      try {
        const res = await fetch('/api/monitor/test-telegram', { method: 'POST' });
        if (res.ok) showToast('Test alert sent to Telegram', 'success');
        else showToast('Telegram test failed', 'error');
      } catch (err) {
        showToast(`Telegram error: ${err.message}`, 'error');
      }
    }

    function updateRefreshTimer() {
      refreshCountdown--;
      if (refreshCountdown <= 0) {
        refreshCountdown = REFRESH_INTERVAL;
        fetchStatus();
      }
      document.getElementById('refreshTimer').textContent = `${refreshCountdown}s`;
    }

    async function fetchPlaybackErrors() {
      try {
        const res = await fetch('/api/playback-errors');
        if (!res.ok) return;
        const data = await res.json();
        const el = document.getElementById('playbackErrorsList');
        if (!data.errors || data.errors.length === 0) {
          el.innerHTML = '<span style="color:#475569; font-style:italic;">No playback errors recorded.</span>';
          return;
        }
        el.innerHTML = data.errors.map(e => `
          <div style="display:flex; gap:10px; align-items:baseline; padding:6px 0; border-bottom:1px solid #1e293b;">
            <span style="color:#ef4444; flex-shrink:0;">✕</span>
            <span style="color:#fca5a5; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${e.track_name || '?'}">${e.track_name || 'Unknown track'}</span>
            <span style="color:#64748b; flex-shrink:0;">${e.dancer_name || '—'}</span>
            <span style="color:#475569; flex-shrink:0; font-size:11px;">${e.occurred_at || ''}</span>
          </div>`).join('');
      } catch {}
    }

    async function clearPlaybackErrors() {
      const pin = getPin();
      if (!pin) { showToast('Enter PIN first', 'error'); return; }
      try {
        const res = await fetch('/api/playback-errors', {
          method: 'DELETE',
          headers: { 'Authorization': 'Bearer ' + pin }
        });
        if (res.ok) { showToast('Playback errors cleared', 'success'); fetchPlaybackErrors(); }
        else showToast('Clear failed — check PIN', 'error');
      } catch (e) { showToast('Error: ' + e.message, 'error'); }
    }

    fetchStatus();
    fetchPlaybackErrors();
    setInterval(updateRefreshTimer, 1000);
  </script>
</body>
</html>
