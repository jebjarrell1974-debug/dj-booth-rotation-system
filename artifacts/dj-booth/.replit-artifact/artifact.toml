kind = "web"
previewPath = "/"
title = "DJ Booth Rotation System"
version = "1.0.0"
id = "artifacts/dj-booth"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18593

[services.development]
run = "pnpm --filter @workspace/dj-booth run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dj-booth", "run", "build" ]
publicDir = "artifacts/dj-booth/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18593"
BASE_PATH = "/"
